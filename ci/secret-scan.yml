# Hilbra CI — secret-scan + policy-oracle guard (LAW Article 4).
#
# INSTALL: copy this file to `.github/workflows/ci.yml`. That move requires a GitHub
# token with the `workflow` scope, so it is an operator step (the acer review token
# carries only `repo`). Until installed + marked a REQUIRED check in branch protection,
# the secret-scanner is NOT yet an enforced merge gate — see SECRETS.md / GOVERNANCE.md.
#
# What it enforces once active:
#   - gitleaks (default ruleset + .gitleaks.toml) blocks any commit/PR carrying a key,
#     token, private-key file, or key-bearing filename.
#   - the policy oracle cannot be silently gutted (>= 40 non-comment fragments).

name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  policy-oracle-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pii-fragment-floor
        run: |
          n=$(grep -vE '^\s*#|^\s*$' policy-oracle/pii-fragments.txt | wc -l)
          echo "policy-oracle fragments: $n"
          if [ "$n" -lt 40 ]; then
            echo "::error::policy oracle gutted ($n < 40 fragments)"
            exit 1
          fi

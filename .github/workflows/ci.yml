name: hilbra-ci

# Two hard gates on every push/PR:
#   1) secret-scan  — block any commit carrying a key/token/secret (LAW Article 4: key-off-wire)
#   2) policy-oracle — the public PII deny-list must be present + non-empty (it cannot silently drift)
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (BLOCK any key/secret)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  policy-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: public PII deny-list present + non-empty
        run: |
          test -s policy-oracle/pii-fragments.txt
          n=$(grep -cve '^\s*#' -e '^\s*$' policy-oracle/pii-fragments.txt || true)
          echo "policy-oracle: $n active fragments"
          test "$n" -ge 40   # the founding policy ships 45 fragments; guard against accidental gutting
